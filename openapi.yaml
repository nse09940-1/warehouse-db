openapi: 3.0.3
info:
  title: Warehouse Workload API
  version: 1.0.0
  description: HTTP workload service for OLTP, OLAP and log/time-series PostgreSQL profiling.
servers:
  - url: http://localhost:8080
    description: Local Docker API
tags:
  - name: Health
  - name: OLTP
  - name: OLAP
  - name: Log
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/oltp/orders/{orderId}:
    get:
      tags: [OLTP]
      summary: Read one order with customer, products, brands, categories and audit notes
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderReadResponse"
        "404":
          $ref: "#/components/responses/Error"
  /api/oltp/orders:
    post:
      tags: [OLTP]
      summary: Create a synthetic order
      description: Request body is optional. The service chooses seeded customer and products itself.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              example: {}
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreateResponse"
        "409":
          $ref: "#/components/responses/Error"
  /api/oltp/orders/{orderId}/status:
    post:
      tags: [OLTP]
      summary: Update order status and write status/audit events
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUpdateResponse"
        "404":
          $ref: "#/components/responses/Error"
  /api/olap/revenue-by-day:
    get:
      tags: [OLAP]
      summary: Revenue by day and category
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Aggregated revenue rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueByDayResponse"
  /api/olap/warehouse-turnover:
    get:
      tags: [OLAP]
      summary: Warehouse turnover with window ranking
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: min_quantity
          in: query
          schema:
            type: number
            default: 1
          example: 1
      responses:
        "200":
          description: Ranked warehouse turnover rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseTurnoverResponse"
  /api/log/order-status-events:
    post:
      tags: [Log]
      summary: Insert one status event into the append-heavy log table
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogInsertRequest"
      responses:
        "201":
          description: Inserted event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogInsertResponse"
        "409":
          $ref: "#/components/responses/Error"
components:
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 400001
    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
        default: "2020-01-01T00:00:00Z"
      example: "2020-01-01T00:00:00Z"
    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
        default: "2100-01-01T00:00:00Z"
      example: "2100-01-01T00:00:00Z"
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    Order:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
        customer_id:
          type: integer
          format: int64
        customer_name:
          type: string
        delivery_address:
          type: string
        created_at:
          type: string
        status:
          type: string
          enum: [new, confirmed, picking, shipped, delivered, cancelled]
        delivery_priority:
          type: integer
          nullable: true
        total_amount:
          type: string
        items_count:
          type: integer
        audit_note_count:
          type: integer
          format: int64
        last_audit_note:
          type: string
          nullable: true
    OrderItem:
      type: object
      properties:
        order_item_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        product_name:
          type: string
        brand_name:
          type: string
        category_name:
          type: string
        ordered_quantity:
          type: string
        sale_price:
          type: string
    OrderReadResponse:
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Order"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    OrderCreateResponse:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
        customer_id:
          type: integer
          format: int64
        delivery_address:
          type: string
        created_at:
          type: string
        status:
          type: string
        total_amount:
          type: string
        items_count:
          type: integer
        item_count:
          type: integer
          format: int64
    StatusUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [new, confirmed, picking, shipped, delivered, cancelled]
          default: confirmed
      example:
        status: confirmed
    StatusUpdateResponse:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
        old_status:
          type: string
        new_status:
          type: string
        event_id:
          type: integer
          format: int64
        audit_note_id:
          type: integer
          format: int64
    RevenueByDayResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              sales_day:
                type: string
              category_name:
                type: string
              order_count:
                type: integer
                format: int64
              revenue:
                type: string
              audit_note_count:
                type: integer
                format: int64
    WarehouseTurnoverResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              warehouse_id:
                type: integer
                format: int64
              warehouse_name:
                type: string
              product_id:
                type: integer
                format: int64
              product_name:
                type: string
              received_quantity:
                type: string
              shipped_quantity:
                type: string
              adjusted_quantity:
                type: string
              total_quantity:
                type: string
              product_rank:
                type: integer
    LogInsertRequest:
      type: object
      properties:
        status:
          type: string
          enum: [new, confirmed, picking, shipped, delivered, cancelled]
          default: confirmed
      example:
        status: confirmed
    LogInsertResponse:
      type: object
      properties:
        event_id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        created_at:
          type: string
