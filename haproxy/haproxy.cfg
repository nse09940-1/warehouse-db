global
  log stdout format raw local0
  maxconn 2048

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client 1m
  timeout server 1m

frontend postgres_rw
  bind *:5432
  default_backend patroni_primary

backend patroni_primary
  mode tcp
  option httpchk GET /primary
  http-check expect status 200
  default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
  server patroni1 patroni1:5432 check port 8008
  server patroni2 patroni2:5432 check port 8008

listen stats
  mode http
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
