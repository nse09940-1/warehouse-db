services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.16
    command:
      - /usr/local/bin/etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://etcd1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-metrics-urls=http://0.0.0.0:2381
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --enable-v2=true
      - --initial-cluster-token=${ETCD_INITIAL_CLUSTER_TOKEN:-warehouse-etcd-cluster}
    volumes:
      - etcd1_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  etcd2:
    image: quay.io/coreos/etcd:v3.5.16
    command:
      - /usr/local/bin/etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://etcd2:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-metrics-urls=http://0.0.0.0:2381
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --enable-v2=true
      - --initial-cluster-token=${ETCD_INITIAL_CLUSTER_TOKEN:-warehouse-etcd-cluster}
    volumes:
      - etcd2_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  etcd3:
    image: quay.io/coreos/etcd:v3.5.16
    command:
      - /usr/local/bin/etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://etcd3:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-metrics-urls=http://0.0.0.0:2381
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --enable-v2=true
      - --initial-cluster-token=${ETCD_INITIAL_CLUSTER_TOKEN:-warehouse-etcd-cluster}
    volumes:
      - etcd3_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  patroni1:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    environment:
      PATRONI_SCOPE: ${PATRONI_SCOPE:-warehouse-cluster}
      PATRONI_NAME: patroni1
      PATRONI_ETCD_HOSTS: etcd1:2379,etcd2:2379,etcd3:2379
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni1:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni1:5432
      PATRONI_DATA_DIR: /var/lib/postgresql/patroni
      PATRONI_TTL: ${PATRONI_TTL:-30}
      PATRONI_LOOP_WAIT: ${PATRONI_LOOP_WAIT:-10}
      PATRONI_RETRY_TIMEOUT: ${PATRONI_RETRY_TIMEOUT:-10}
      PATRONI_SUPERUSER_USERNAME: ${PATRONI_SUPERUSER_USERNAME:-postgres}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres_password}
      PATRONI_REPLICATION_USERNAME: ${PATRONI_REPLICATION_USERNAME:-replicator}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator_password}
      PATRONI_REWIND_USERNAME: ${PATRONI_REWIND_USERNAME:-postgres}
      PATRONI_REWIND_PASSWORD: ${PATRONI_REWIND_PASSWORD:-postgres_password}
      PATRONI_DEBEZIUM_USERNAME: ${DEBEZIUM_USER:-debezium}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    shm_size: 1gb
    volumes:
      - patroni1_data:/var/lib/postgresql/patroni
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8008/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  patroni2:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    environment:
      PATRONI_SCOPE: ${PATRONI_SCOPE:-warehouse-cluster}
      PATRONI_NAME: patroni2
      PATRONI_ETCD_HOSTS: etcd1:2379,etcd2:2379,etcd3:2379
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni2:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni2:5432
      PATRONI_DATA_DIR: /var/lib/postgresql/patroni
      PATRONI_TTL: ${PATRONI_TTL:-30}
      PATRONI_LOOP_WAIT: ${PATRONI_LOOP_WAIT:-10}
      PATRONI_RETRY_TIMEOUT: ${PATRONI_RETRY_TIMEOUT:-10}
      PATRONI_SUPERUSER_USERNAME: ${PATRONI_SUPERUSER_USERNAME:-postgres}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres_password}
      PATRONI_REPLICATION_USERNAME: ${PATRONI_REPLICATION_USERNAME:-replicator}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator_password}
      PATRONI_REWIND_USERNAME: ${PATRONI_REWIND_USERNAME:-postgres}
      PATRONI_REWIND_PASSWORD: ${PATRONI_REWIND_PASSWORD:-postgres_password}
      PATRONI_DEBEZIUM_USERNAME: ${DEBEZIUM_USER:-debezium}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    shm_size: 1gb
    volumes:
      - patroni2_data:/var/lib/postgresql/patroni
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8008/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  haproxy:
    image: haproxy:lts-bookworm
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
      - "8404:8404"
    depends_on:
      patroni1:
        condition: service_healthy
      patroni2:
        condition: service_healthy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      default:
        aliases:
          - postgres

  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-03-12T17-29-24Z
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BACKUP_USER: ${MINIO_BACKUP_USER}
      MINIO_BACKUP_PASSWORD: ${MINIO_BACKUP_PASSWORD}
      BUCKET_BACKUP_NAME: ${BUCKET_BACKUP_NAME}
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/scripts/minio-init.sh"]

  migrator:
    build:
      context: .
      dockerfile: Dockerfile.migrator
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${PATRONI_SUPERUSER_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres_password}
      TEST_DB_NAME: ${TEST_DB_NAME}
      RUN_SEQWALL: ${RUN_SEQWALL:-false}
      APP_ENV: ${APP_ENV}
      APP_DB_USER: ${POSTGRES_USER}
      MIGRATION_TARGET_TAG: ${MIGRATION_VERSION}
      SEED_COUNT: ${SEED_COUNT}
      POSTGRES_EXPORTER_USER: ${POSTGRES_EXPORTER_USER}
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD}
      DEBEZIUM_USER: ${DEBEZIUM_USER:-debezium}
      DEBEZIUM_PASSWORD: ${DEBEZIUM_PASSWORD:-debezium_password}
      DEBEZIUM_PUBLICATION_NAME: ${DEBEZIUM_PUBLICATION_NAME:-inventory_movements_publication}
      METABASE_DB_NAME: ${METABASE_DB_NAME:-metabase}
      METABASE_DB_USER: ${METABASE_DB_USER:-metabase_user}
      METABASE_DB_PASSWORD: ${METABASE_DB_PASSWORD:-metabase_password}
    depends_on:
      haproxy:
        condition: service_started
    volumes:
      - ./:/workspace
    entrypoint: ["/bin/bash", "/workspace/scripts/migrator-entrypoint.sh"]

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  debezium-connect:
    image: quay.io/debezium/connect:3.0
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: warehouse-debezium-connect
      CONFIG_STORAGE_TOPIC: warehouse_debezium_connect_configs
      OFFSET_STORAGE_TOPIC: warehouse_debezium_connect_offsets
      STATUS_STORAGE_TOPIC: warehouse_debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-connect
      CONNECT_PLUGIN_PATH: /kafka/connect,/debezium-connector-postgres
    depends_on:
      kafka:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${DEBEZIUM_CONNECT_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/connectors > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  debezium-register:
    image: curlimages/curl:8.8.0
    profiles: ["bi-init"]
    environment:
      DEBEZIUM_CONNECT_URL: http://debezium-connect:8083
      DEBEZIUM_CONNECTOR_NAME: ${DEBEZIUM_CONNECTOR_NAME:-postgres-connector}
      POSTGRES_DB: ${POSTGRES_DB}
      DEBEZIUM_USER: ${DEBEZIUM_USER:-debezium}
      DEBEZIUM_PASSWORD: ${DEBEZIUM_PASSWORD:-debezium_password}
      DEBEZIUM_TOPIC_PREFIX: ${DEBEZIUM_TOPIC_PREFIX:-warehouse_cdc}
      DEBEZIUM_SLOT_NAME: ${DEBEZIUM_SLOT_NAME:-inventory_movements_slot}
      DEBEZIUM_PUBLICATION_NAME: ${DEBEZIUM_PUBLICATION_NAME:-inventory_movements_publication}
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/cdc/debezium/register.sh"]

  debezium-watchdog:
    image: curlimages/curl:8.8.0
    environment:
      DEBEZIUM_CONNECT_URL: http://debezium-connect:8083
      DEBEZIUM_CONNECTOR_NAME: ${DEBEZIUM_CONNECTOR_NAME:-postgres-connector}
      POSTGRES_DB: ${POSTGRES_DB}
      DEBEZIUM_USER: ${DEBEZIUM_USER:-debezium}
      DEBEZIUM_PASSWORD: ${DEBEZIUM_PASSWORD:-debezium_password}
      DEBEZIUM_TOPIC_PREFIX: ${DEBEZIUM_TOPIC_PREFIX:-warehouse_cdc}
      DEBEZIUM_SLOT_NAME: ${DEBEZIUM_SLOT_NAME:-inventory_movements_slot}
      DEBEZIUM_PUBLICATION_NAME: ${DEBEZIUM_PUBLICATION_NAME:-inventory_movements_publication}
      DEBEZIUM_POLL_INTERVAL_SECONDS: 10
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/cdc/debezium/watchdog.sh"]

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: warehouse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium-connect:8083
    depends_on:
      kafka:
        condition: service_healthy
      debezium-connect:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-bi_analytics}
      CLICKHOUSE_SKIP_USER_SETUP: "1"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_ADMIN_USER:-clickhouse_admin}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-clickhouse_admin_password}
      CLICKHOUSE_METABASE_USER: ${CLICKHOUSE_METABASE_USER:-clickhouse_metabase}
      CLICKHOUSE_METABASE_PASSWORD: ${CLICKHOUSE_METABASE_PASSWORD:-clickhouse_metabase_password}
      CLICKHOUSE_CDC_TOPIC: "${DEBEZIUM_TOPIC_PREFIX:-warehouse_cdc}.public.inventory_movements"
      CLICKHOUSE_KAFKA_GROUP: ${CLICKHOUSE_KAFKA_GROUP:-warehouse_inventory_movements_clickhouse}
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/lab7-config.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/lab7-users.xml:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$$CLICKHOUSE_ADMIN_USER\" --password \"$$CLICKHOUSE_ADMIN_PASSWORD\" --query 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  metabase:
    build:
      context: .
      dockerfile: Dockerfile.metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabase}
      MB_DB_USER: ${METABASE_DB_USER:-metabase_user}
      MB_DB_PASS: ${METABASE_DB_PASSWORD:-metabase_password}
      MB_PLUGINS_DIR: /plugins
    depends_on:
      migrator:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    ports:
      - "${METABASE_PORT:-3001}:3000"
  warehouse-api:
    build:
      context: .
      dockerfile: workload/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_PORT: ${API_PORT:-8080}
      API_THREADS: ${API_THREADS:-4}
      API_DB_POOL_SIZE: ${API_DB_POOL_SIZE:-16}
      API_USE_REVENUE_MV: ${API_USE_REVENUE_MV:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      haproxy:
        condition: service_started
      migrator:
        condition: service_completed_successfully

  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backup-scheduler
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BACKUP_USER: ${MINIO_BACKUP_USER}
      MINIO_BACKUP_PASSWORD: ${MINIO_BACKUP_PASSWORD}
      BUCKET_BACKUP_NAME: ${BUCKET_BACKUP_NAME}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL}
      BACKUP_STATE_FILE: /backup-state/last-backup-state.json
    depends_on:
      minio-init:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    volumes:
      - backup_state:/backup-state

  backup-exporter:
    image: python:3.12-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      BUCKET_BACKUP_NAME: ${BUCKET_BACKUP_NAME}
      BACKUP_STATE_FILE: /backup-state/last-backup-state.json
    depends_on:
      backup-scheduler:
        condition: service_started
    command: ["python", "/workspace/scripts/backup-exporter.py"]
    volumes:
      - ./:/workspace:ro
      - backup_state:/backup-state:ro

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    command:
      - --collector.stat_statements
    environment:
      DATA_SOURCE_URI: "postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_EXPORTER_USER}
      DATA_SOURCE_PASS: ${POSTGRES_EXPORTER_PASSWORD}
    depends_on:
      haproxy:
        condition: service_started
      migrator:
        condition: service_completed_successfully
  haproxy-exporter:
    image: prom/haproxy-exporter:v0.15.0
    command:
      - --haproxy.scrape-uri=http://haproxy:8404/stats;csv
      - --web.listen-address=:9101
    depends_on:
      haproxy:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    depends_on:
      postgres_exporter:
        condition: service_started
      backup-exporter:
        condition: service_started
      haproxy-exporter:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  k6:
    image: grafana/k6:0.53.0
    profiles: ["load"]
    environment:
      BASE_URL: http://warehouse-api:8080
      FIRST_ORDER_ID: ${K6_FIRST_ORDER_ID:-400001}
      ORDER_COUNT: ${K6_ORDER_COUNT:-25000}
    depends_on:
      warehouse-api:
        condition: service_started
    volumes:
      - ./load:/scripts:ro
      - ./profiling:/profiling
    command:
      - run
      - --summary-export
      - ${K6_SUMMARY_EXPORT:-/profiling/1/k6_summary.json}
      - /scripts/k6_script.js

volumes:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  patroni1_data:
  patroni2_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  minio_data:
  backup_state:
  clickhouse_data:
